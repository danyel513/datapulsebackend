server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: datapulse-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/datapulse}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    time-zone: UTC

logging:
  level:
    org.springframework.web: ${LOG_WEB_LEVEL:INFO}
    org.hibernate.SQL: ${LOG_SQL_LEVEL:DEBUG}
    org.hibernate.orm.jdbc.bind: ${LOG_BIND_LEVEL:TRACE}